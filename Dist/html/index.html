<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Styles/variables.css">
    <link rel="stylesheet" href="../Styles/index.css">
    <link rel="stylesheet" href="../Styles/glass.css">
    <link rel="stylesheet" href="../Styles/auth.css">
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb--1"></div>
        <div class="orb orb--2"></div>
        <div class="orb orb--3"></div>
        <div class="orb orb--4"></div>
    </div>

    <div id="app">
        <div class="auth-container" id="auth-container">
            <div class="auth-card" id="auth-card">
                <div class="auth-card__front" id="login-view">
                    <div class="auth-card__header">
                        <div class="auth-logo">
                            <svg class="auth-logo__icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="20" cy="20" r="20" fill="url(#logo-grad)"/>
                                <path d="M14 28V14l14 7-14 7z" fill="white" opacity="0.9"/>
                                <defs>
                                    <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40">
                                        <stop stop-color="#a0c4ff"/>
                                        <stop offset="1" stop-color="#f8b4c8"/>
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                        <h1 class="auth-card__title">Bienvenido</h1>
                        <p class="auth-card__subtitle">Iniciá sesión para continuar</p>
                    </div>

                    <form class="auth-form" id="login-form" novalidate>
                        <div class="form-group">
                            <label class="form-label" for="login-username">Username</label>
                            <div class="form-input-wrap">
                                <svg class="form-input-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10 10a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 1114 0H3z"/></svg>
                                <input class="form-input" type="text" id="login-username" placeholder="Tu usuario" autocomplete="username" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="login-password">Password</label>
                            <div class="form-input-wrap">
                                <svg class="form-input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
                                <input class="form-input" type="password" id="login-password" placeholder="Tu contraseña" autocomplete="current-password" required>
                                <button type="button" class="form-toggle-pw" id="login-toggle-pw" aria-label="Mostrar contraseña">
                                    <svg class="eye-open" viewBox="0 0 20 20" fill="currentColor"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
                                    <svg class="eye-closed" viewBox="0 0 20 20" fill="currentColor" style="display:none"><path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd"/><path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/></svg>
                                </button>
                            </div>
                        </div>

                        <div class="form-error" id="login-error"></div>

                        <button type="submit" class="btn btn--primary">
                            <span class="btn__text">Iniciar sesión</span>
                            <span class="btn__loader" style="display:none"></span>
                        </button>
                    </form>

                    <div class="auth-card__footer">
                        <span class="auth-card__footer-text">¿No tenés cuenta?</span>
                        <button class="auth-card__link" id="go-to-register">Registrate</button>
                    </div>
                </div>

                <div class="auth-card__front auth-card__front--hidden" id="register-view">
                    <div class="auth-card__header">
                        <div class="auth-logo">
                            <svg class="auth-logo__icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="20" cy="20" r="20" fill="url(#logo-grad2)"/>
                                <path d="M14 28V14l14 7-14 7z" fill="white" opacity="0.9"/>
                                <defs>
                                    <linearGradient id="logo-grad2" x1="0" y1="0" x2="40" y2="40">
                                        <stop stop-color="#f8b4c8"/>
                                        <stop offset="1" stop-color="#a0c4ff"/>
                                    </linearGradient>
                                </defs>
                            </svg>
                        </div>
                        <h1 class="auth-card__title">Crear cuenta</h1>
                        <p class="auth-card__subtitle">Completá tus datos para registrarte</p>
                    </div>

                    <form class="auth-form" id="register-form" novalidate>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label" for="reg-name">Nombre</label>
                                <div class="form-input-wrap">
                                    <svg class="form-input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
                                    <input class="form-input" type="text" id="reg-name" placeholder="Tu nombre" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="form-label" for="reg-lastname">Apellido</label>
                                <div class="form-input-wrap">
                                    <svg class="form-input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/></svg>
                                    <input class="form-input" type="text" id="reg-lastname" placeholder="Tu apellido" required>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="reg-username">Username</label>
                            <div class="form-input-wrap">
                                <svg class="form-input-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10 10a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 1114 0H3z"/></svg>
                                <input class="form-input" type="text" id="reg-username" placeholder="Elegí un usuario" autocomplete="username" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="reg-password">Password</label>
                            <div class="form-input-wrap">
                                <svg class="form-input-icon" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
                                <input class="form-input" type="password" id="reg-password" placeholder="Elegí una contraseña" autocomplete="new-password" required>
                                <button type="button" class="form-toggle-pw" id="reg-toggle-pw" aria-label="Mostrar contraseña">
                                    <svg class="eye-open" viewBox="0 0 20 20" fill="currentColor"><path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/></svg>
                                    <svg class="eye-closed" viewBox="0 0 20 20" fill="currentColor" style="display:none"><path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd"/><path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/></svg>
                                </button>
                            </div>
                        </div>

                        <div class="form-error" id="register-error"></div>

                        <button type="submit" class="btn btn--primary btn--pink">
                            <span class="btn__text">Crear cuenta</span>
                            <span class="btn__loader" style="display:none"></span>
                        </button>
                    </form>

                    <div class="auth-card__footer">
                        <span class="auth-card__footer-text">¿Ya tenés cuenta?</span>
                        <button class="auth-card__link" id="go-to-login">Iniciá sesión</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="app-container" id="app-container" style="display:none">
            <h1 style="color:white;text-align:center;margin-top:40vh;font-family:var(--font)">Playlist App — Próximamente</h1>
        </div>
    </div>

    <script type="module" src="../../Src/db/indexedDB.js"></script>
    <script type="module" src="../../Src/app.js"></script>
</body>
</html>
